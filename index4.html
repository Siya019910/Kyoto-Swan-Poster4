<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body { height: 100vh; margin: 0; overflow: hidden; background: #c0c0c0; color: #000; display: flex; flex-direction: column; font-family: sans-serif; }
        .stack { display: flex; height: 40%; width: 100%; border-bottom: 4px solid #6a0dad; }
        .stack div { flex: 1; background-size: cover; background-position: center; border: 2px solid #fff; }
        
        .main { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 20px; text-align: center; background: #fff; }
        .biz-name { font-family: 'Brush Script MT', cursive; font-weight: bold; font-size: 3rem; margin: 0; }
        .slogan { font-style: italic; color: #6a0dad; font-weight: bold; font-size: 0.8rem; letter-spacing: 2px; }
        .qr-circle { width: 120px; height: 120px; padding: 10px; border-radius: 50%; border: 2px solid #000; margin: 20px 0; }
        .services { font-style: italic; font-size: 1.1rem; }
        footer { text-align: center; font-size: 0.6rem; padding: 10px; border-top: 1px solid #ddd; }
    </style>
</head>
<body>
    <div class="stack">
        <div style="background-image: url('bg1.jpg');"></div>
        <div style="background-image: url('bg2.jpg');"></div>
        <div style="background-image: url('bg3.jpg');"></div>
    </div>
    <div class="main">
        <img src="logo.png" style="width: 50px;">
        <div class="biz-name">Kyoto Swan</div>
        <p class="slogan">*KYOTO ELEGANCE • MODERN RADIANCE*</p>
        <div class="qr-circle"><img src="qrcode.png" style="width:100%; border-radius:50%;"></div>
        <p class="services">*Hair, Nails & Beauty Excellence*</p>
    </div>
    <footer>© TRADEMARK 2026 KYOTO SWAN</footer>
</body>
</html>
